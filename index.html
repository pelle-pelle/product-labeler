<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Labeler - Enhanced Catalog No.</title>
    <style>
      body {
        font-family: "Helvetica Neue", Arial, sans-serif;
        text-align: center;
        background: #f4f7f9;
        padding: 20px;
        color: #333;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        display: inline-block;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        width: 440px;
      }
      h1 {
        font-size: 20px;
        margin-bottom: 20px;
        color: #444;
      }
      .controls {
        display: grid;
        gap: 12px;
        margin-bottom: 20px;
        text-align: left;
      }
      label {
        font-size: 11px;
        font-weight: bold;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      input[type="text"],
      input[type="file"] {
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        width: 100%;
        box-sizing: border-box;
      }
      canvas {
        border: 1px solid #eee;
        background: #fff;
        max-width: 100%;
        border-radius: 4px;
        margin-top: 10px;
      }
      .button-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 10px;
      }
      button {
        cursor: pointer;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        transition: 0.2s;
      }
      .btn-draw {
        background: #333;
        color: white;
      }
      .btn-save {
        background: #28a745;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Product Labeler</h1>

      <div class="controls">
        <label>1. Base Image</label>
        <input type="file" id="upload" accept="image/*" />

        <label>2. Product Name (Text A)</label>
        <input type="text" id="textA" placeholder="商品名を入力" />

        <label>3. Description (Text B)</label>
        <input type="text" id="textB" placeholder="商品説明を入力" />

        <label>4. Item Code (Text C)</label>
        <input type="text" id="textC" placeholder="6桁のコード" maxlength="6" />

        <div class="button-group">
          <button class="btn-draw" onclick="draw()">Preview</button>
          <button class="btn-save" onclick="download()">Save JPG</button>
        </div>
      </div>

      <canvas id="canvas" width="420" height="560"></canvas>
    </div>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      let imgElement = new Image();

      document.getElementById("upload").addEventListener("change", (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
          imgElement.src = event.target.result;
          imgElement.onload = () => draw();
        };
        reader.readAsDataURL(e.target.files[0]);
      });

      // テキスト折り返し＋座布団描画の職人関数（変更なし）
      function wrapText(
        context,
        text,
        x,
        y,
        maxWidth,
        lineHeight,
        textFillStyle,
      ) {
        if (!text) return y;
        const words = text.split("");
        let line = "";
        let currentY = y;
        const padding = 12;

        let lineCount = 1;
        let testLineTemp = "";
        for (let n = 0; n < words.length; n++) {
          let testLine = testLineTemp + words[n];
          if (context.measureText(testLine).width > maxWidth && n > 0) {
            testLineTemp = words[n];
            lineCount++;
          } else {
            testLineTemp = testLine;
          }
        }
        const totalHeight = lineCount * lineHeight;

        const grad = context.createLinearGradient(0, 0, maxWidth + 80, 0);
        grad.addColorStop(0, "rgba(255, 255, 255, 0.95)");
        grad.addColorStop(0.8, "rgba(255, 255, 255, 0.6)");
        grad.addColorStop(1, "rgba(255, 255, 255, 0)");

        context.fillStyle = grad;
        context.fillRect(
          0,
          y - lineHeight * 0.8 - padding,
          maxWidth + 80,
          totalHeight + padding * 2,
        );

        context.textAlign = "left";
        context.fillStyle = textFillStyle;
        context.strokeStyle = "rgba(255, 255, 255, 0.8)";
        context.lineWidth = 4;
        context.lineJoin = "round";

        line = "";
        for (let n = 0; n < words.length; n++) {
          let testLine = line + words[n];
          if (context.measureText(testLine).width > maxWidth && n > 0) {
            context.strokeText(line, x, currentY);
            context.fillText(line, x, currentY);
            line = words[n];
            currentY += lineHeight;
          } else {
            line = testLine;
          }
        }
        context.strokeText(line, x, currentY);
        context.fillText(line, x, currentY);
        return currentY;
      }

      function draw() {
        // 1. キャンバス全体を白で塗りつぶす（背景色）
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 画像が選択されていない場合はここで終了
        if (!imgElement.src) return;

        // 2. 画像を左下に配置
        const drawX = 0;
        const drawY = canvas.height - imgElement.height;
        ctx.drawImage(imgElement, drawX, drawY);

        // 3. テキストの描画
        const maxWidth = 350;
        const startX = 20;
        const textColor = "#222222";

        // 商品名 (Text A)
        ctx.font = "bold 24px sans-serif";
        let nextY = wrapText(
          ctx,
          document.getElementById("textA").value,
          startX,
          50,
          maxWidth,
          34,
          textColor,
        );

        // 商品説明 (Text B)
        ctx.font = "18px sans-serif";
        wrapText(
          ctx,
          document.getElementById("textB").value,
          startX,
          nextY + 45,
          maxWidth,
          26,
          textColor,
        );

        // --- 【今回の修正ポイント】右下エリアの再構築 ---
        const codeColor = "#0056b3"; // コードの色（青系）
        const baseEndX = canvas.width - 15; // 右端からの余白
        const baseEndY = canvas.height - 15; // 下端からの余白

        // 共通の設定：右詰め
        ctx.textAlign = "right";
        ctx.fillStyle = codeColor;

        // A. 小さく「カタログ番号」というラベルを描画
        ctx.font = "bold 16px sans-serif"; // 小さく、サンセリフ体、太字
        // Y座標の計算：コードの基準位置（EndY）から、コードの高さ（約32px）と少し隙間（5px）を引いた位置
        const labelY = baseEndY - 32 - 5;
        ctx.fillText("カタログ番号", baseEndX, labelY);

        // B. 大きくテキストC（商品コード）を描画
        ctx.font = "bold 32px monospace"; // 巨大化、等幅フォント
        ctx.fillText(
          document.getElementById("textC").value,
          baseEndX,
          baseEndY,
        );
        // ----------------------------------------------
      }

      function download() {
        const link = document.createElement("a");
        link.download = "product-image.jpg";
        // 画質を少し高めに(0.95)設定
        link.href = canvas.toDataURL("image/jpeg", 0.95);
        link.click();
      }
    </script>
  </body>
</html>
